<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Impedidos – SIGAP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .navbar-sigap { background: #1a3a5c !important; }
        .resultado-wrap { min-height: 160px; }
        .status-badge { font-size: 1rem; padding: .45em .75em; }
        .motivo-tag  { font-size: .78rem; padding: .3em .6em; }
        .hist-th     { font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; color: #6c757d; }
        .cpf-mono    { font-family: monospace; letter-spacing: .05em; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark navbar-sigap mb-4 py-2">
    <div class="container">
        <span class="navbar-brand fw-bold mb-0">
            <i class="bi bi-shield-check me-2"></i>Consulta de Impedidos
        </span>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white-50 small" id="navUser"></span>
            <a href="/painel-admin" id="btnAdmin"
               class="btn btn-outline-light btn-sm d-none">
                <i class="bi bi-gear me-1"></i>Admin
            </a>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">
                <i class="bi bi-box-arrow-right me-1"></i>Sair
            </button>
        </div>
    </div>
</nav>

<div class="container">

    <!-- Formulário -->
    <div class="card shadow-sm mb-4">
        <div class="card-body p-4">
            <p class="text-muted text-uppercase fw-bold mb-3"
               style="font-size:.75rem; letter-spacing:.06em;">
                <i class="bi bi-search me-1"></i>Consultar CPF
            </p>
            <form id="formConsulta" class="row g-2 align-items-end">
                <div class="col-sm-7 col-md-5 col-lg-4">
                    <label class="form-label fw-semibold" for="cpfInput">CPF do Jogador</label>
                    <input type="text" class="form-control form-control-lg cpf-mono"
                           id="cpfInput" placeholder="000.000.000-00"
                           maxlength="14" autocomplete="off" required>
                    <div class="invalid-feedback">Informe um CPF válido com 11 dígitos.</div>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary btn-lg" id="btnConsultar">
                        <i class="bi bi-search me-1"></i>Consultar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Resultado -->
    <div id="secResultado" class="d-none mb-4">
        <div class="card shadow-sm resultado-wrap">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <p class="text-muted text-uppercase fw-bold mb-0"
                       style="font-size:.75rem; letter-spacing:.06em;">
                        <i class="bi bi-person-check me-1"></i>Resultado
                    </p>
                    <small class="text-muted" id="resTimestamp"></small>
                </div>
                <div class="row g-3">
                    <div class="col-sm-4">
                        <div class="text-muted small mb-1">CPF</div>
                        <div class="fw-bold fs-5 cpf-mono" id="resCpf"></div>
                    </div>
                    <div class="col-sm-4">
                        <div class="text-muted small mb-1">Status</div>
                        <div id="resStatus" class="mt-1"></div>
                    </div>
                    <div class="col-sm-4">
                        <div class="text-muted small mb-1">Motivos</div>
                        <div id="resMotivos" class="mt-1"></div>
                    </div>
                </div>
                <!-- Linha de autoexclusão — visível só quando aplicável -->
                <div id="secAutoexclusao" class="d-none mt-3 p-3 rounded"
                     style="background:#fff3cd; border-left:4px solid #ffc107;">
                    <i class="bi bi-calendar-x me-2 text-warning"></i>
                    <span class="fw-semibold">Autoexcluído desde:</span>
                    <span id="resDataAutoexclusao" class="ms-1"></span>
                </div>
                <hr class="my-3">
                <small class="text-muted">
                    ID da transação: <span id="resTxId" class="font-monospace"></span>
                </small>
            </div>
        </div>
    </div>

    <!-- Histórico -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <p class="text-muted text-uppercase fw-bold mb-0"
                   style="font-size:.75rem; letter-spacing:.06em;">
                    <i class="bi bi-clock-history me-1"></i>Últimas consultas
                </p>
                <button class="btn btn-sm btn-outline-secondary" onclick="carregarHistorico()" title="Atualizar">
                    <i class="bi bi-arrow-clockwise"></i>
                </button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover table-sm mb-0">
                    <thead>
                        <tr>
                            <th class="hist-th">CPF</th>
                            <th class="hist-th">Status</th>
                            <th class="hist-th">Motivos</th>
                            <th class="hist-th">Autoexcluído desde</th>
                            <th class="hist-th">Data / Hora</th>
                        </tr>
                    </thead>
                    <tbody id="histBody">
                        <tr><td colspan="4" class="text-center text-muted py-3">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div><!-- /container -->

<script>
const MOTIVOS_PT = {
    PROGRAMA_SOCIAL:          'Programa Social',
    AUTOEXCLUSAO_CENTRALIZADA: 'Autoexclusão',
};

/* ── Autenticação ─────────────────────────────────────── */
(function () {
    const token = sessionStorage.getItem('token');
    if (!token) { window.location.href = '/'; return; }
    try {
        const p = JSON.parse(atob(token.split('.')[1]));
        if (p.exp * 1000 < Date.now()) { sessionStorage.clear(); window.location.href = '/'; return; }
        document.getElementById('navUser').textContent = p.sub;
        if (p.admin) document.getElementById('btnAdmin').classList.remove('d-none');
    } catch (_) { sessionStorage.clear(); window.location.href = '/'; }
    carregarHistorico();
})();

/* ── Helpers ──────────────────────────────────────────── */
function apiHeaders() {
    return { Authorization: `Bearer ${sessionStorage.getItem('token')}` };
}

async function trataUnauth(resp) {
    if (resp.status === 401 || resp.status === 403) {
        sessionStorage.clear(); window.location.href = '/'; return true;
    }
    return false;
}

function formatarCPF(v) {
    v = v.replace(/\D/g, '').slice(0, 11);
    if (v.length > 9) return v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
    if (v.length > 6) return v.replace(/(\d{3})(\d{3})(\d+)/,          '$1.$2.$3');
    if (v.length > 3) return v.replace(/(\d{3})(\d+)/,                  '$1.$2');
    return v;
}

function exibirCPF(cpf) {
    return cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
}

function badgeStatus(status) {
    if (status === 'IMPEDIDO') return '<span class="badge bg-danger status-badge">IMPEDIDO</span>';
    if (status === 'REGULAR')  return '<span class="badge bg-success status-badge">REGULAR</span>';
    return `<span class="badge bg-secondary status-badge">${status}</span>`;
}

function badgesMotivos(motivos) {
    if (!motivos || motivos.length === 0) return '<span class="text-muted">—</span>';
    return motivos.map(m => {
        const cor   = m === 'AUTOEXCLUSAO_CENTRALIZADA' ? 'bg-warning text-dark' : 'bg-info text-dark';
        const label = MOTIVOS_PT[m] || m;
        return `<span class="badge ${cor} motivo-tag me-1">${label}</span>`;
    }).join('');
}

function formatarData(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' });
}

/* ── Máscara CPF ─────────────────────────────────────── */
document.getElementById('cpfInput').addEventListener('input', function () {
    this.value = formatarCPF(this.value);
    this.classList.remove('is-invalid');
});

/* ── Consulta ────────────────────────────────────────── */
document.getElementById('formConsulta').addEventListener('submit', async (e) => {
    e.preventDefault();
    const cpf = document.getElementById('cpfInput').value.replace(/\D/g, '');
    if (cpf.length !== 11) {
        document.getElementById('cpfInput').classList.add('is-invalid');
        return;
    }

    const btn = document.getElementById('btnConsultar');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status"></span>Consultando...';
    document.getElementById('secResultado').classList.add('d-none');

    try {
        const resp = await fetch(`/consultar/${cpf}`, { headers: apiHeaders() });
        if (await trataUnauth(resp)) return;
        const data = await resp.json();

        if (resp.ok) {
            document.getElementById('resCpf').textContent       = exibirCPF(data.cpf);
            document.getElementById('resStatus').innerHTML      = badgeStatus(data.status);
            document.getElementById('resMotivos').innerHTML     = badgesMotivos(data.motivos);
            document.getElementById('resTimestamp').textContent = formatarData(data.timestamp);
            document.getElementById('resTxId').textContent      = data.transaction_id;

            // Exibe data de autoexclusão quando presente
            const secAE = document.getElementById('secAutoexclusao');
            if (data.data_autoexclusao) {
                document.getElementById('resDataAutoexclusao').textContent = formatarData(data.data_autoexclusao);
                secAE.classList.remove('d-none');
            } else {
                secAE.classList.add('d-none');
            }

            document.getElementById('secResultado').classList.remove('d-none');
            carregarHistorico();
        } else {
            alert(data.detail || 'Erro ao consultar CPF.');
        }
    } catch (_) {
        alert('Erro de conexão. Tente novamente.');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-search me-1"></i>Consultar';
    }
});

/* ── Histórico ───────────────────────────────────────── */
async function carregarHistorico() {
    const tbody = document.getElementById('histBody');
    try {
        const resp = await fetch('/historico?limite=20', { headers: apiHeaders() });
        if (await trataUnauth(resp)) return;
        const data = await resp.json();

        if (!data.transacoes || data.transacoes.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-3">Nenhuma consulta realizada ainda.</td></tr>';
            return;
        }
        tbody.innerHTML = data.transacoes.map(t => `
            <tr>
                <td class="cpf-mono">${exibirCPF(t.cpf)}</td>
                <td>${badgeStatus(t.status)}</td>
                <td>${badgesMotivos(t.motivos)}</td>
                <td><small class="text-muted">${t.data_autoexclusao ? formatarData(t.data_autoexclusao) : '—'}</small></td>
                <td><small class="text-muted">${formatarData(t.timestamp)}</small></td>
            </tr>
        `).join('');
    } catch (_) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center text-danger py-3">Erro ao carregar histórico.</td></tr>';
    }
}

function logout() { sessionStorage.clear(); window.location.href = '/'; }
</script>
</body>
</html>
