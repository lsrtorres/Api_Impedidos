<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impedidos SIGAP – Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-wrapper {
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
            padding: 16px;
        }
        .card-header-custom {
            background: #1a3a5c;
            color: white;
            padding: 28px 32px 20px;
            border-radius: 8px 8px 0 0;
        }
        .card-header-custom h5 {
            margin: 0 0 4px;
            font-weight: 700;
            font-size: 1.15rem;
        }
        .card-header-custom small {
            opacity: 0.7;
            font-size: 0.8rem;
        }
        .card-body-custom {
            background: white;
            padding: 28px 32px 32px;
            border: 1px solid #dee2e6;
            border-top: 0;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,.08);
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="card-header-custom">
            <h5>Consulta de Impedidos</h5>
            <small>Sistema SIGAP — Acesso Restrito</small>
        </div>
        <div class="card-body-custom">
            <div id="alert" class="alert d-none mb-3" role="alert"></div>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label fw-semibold" for="username">Usuário</label>
                    <input type="text" class="form-control form-control-lg" id="username"
                           autocomplete="username" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold" for="password">Senha</label>
                    <input type="password" class="form-control form-control-lg" id="password"
                           autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100" id="btnLogin">
                    Entrar
                </button>
            </form>
        </div>
    </div>

    <script>
        // Redireciona se já estiver logado com token válido
        (function () {
            const token = sessionStorage.getItem('token');
            if (!token) return;
            try {
                const p = JSON.parse(atob(token.split('.')[1]));
                if (p.exp * 1000 > Date.now()) {
                    window.location.href = p.admin ? '/painel-admin' : '/consulta';
                } else {
                    sessionStorage.clear();
                }
            } catch (_) { sessionStorage.clear(); }
        })();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status"></span>Entrando...';
            hideAlert();

            try {
                const resp = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value.trim(),
                        password: document.getElementById('password').value,
                    }),
                });
                const data = await resp.json();

                if (resp.ok) {
                    sessionStorage.setItem('token', data.access_token);
                    const p = JSON.parse(atob(data.access_token.split('.')[1]));
                    sessionStorage.setItem('username', p.sub);
                    sessionStorage.setItem('is_admin', p.admin ? 'true' : 'false');
                    window.location.href = p.admin ? '/painel-admin' : '/consulta';
                } else {
                    showAlert('danger', data.detail || 'Usuário ou senha incorretos');
                    btn.disabled = false;
                    btn.textContent = 'Entrar';
                }
            } catch (_) {
                showAlert('danger', 'Erro de conexão. Verifique a rede e tente novamente.');
                btn.disabled = false;
                btn.textContent = 'Entrar';
            }
        });

        function showAlert(type, msg) {
            const el = document.getElementById('alert');
            el.className = `alert alert-${type}`;
            el.textContent = msg;
        }
        function hideAlert() {
            document.getElementById('alert').className = 'alert d-none';
        }
    </script>
</body>
</html>
